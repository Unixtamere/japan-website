# Reverse proxy for the Japan Trip Tracker.
# The Node server (server/index.js) serves both the static site and /api,
# so nginx just terminates TLS and forwards everything to it.
#
# 1. Replace your-domain.com below.
# 2. Put this in /etc/nginx/sites-available/japan-website and symlink it into
#    /etc/nginx/sites-enabled/.
# 3. Run certbot (see DEPLOY.md) — it will rewrite this to add the HTTPS block
#    and an HTTP->HTTPS redirect automatically.

server {
    listen 80;
    server_name your-domain.com;

    # Allow larger uploads if you ever proxy them; gallery is client-side so
    # this is mostly a safe default.
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
