# Reverse proxy for the Japan Trip Tracker + Traccar, on one box.
#
# Two virtual hosts:
#   your-domain.com          -> the trip site   (Node, container on 127.0.0.1:3001)
#   traccar.your-domain.com  -> Traccar web UI  (container on 127.0.0.1:8082)
#
# Setup:
#   1. Replace both your-domain.com / traccar.your-domain.com below.
#   2. Point BOTH an A record for your-domain.com and one for
#      traccar.your-domain.com at this VPS's IP.
#   3. Put this in /etc/nginx/sites-available/japan-website and symlink it into
#      /etc/nginx/sites-enabled/.
#   4. Run certbot for both names (see DEPLOY.md) — it rewrites these blocks to
#      add HTTPS and the HTTP->HTTPS redirect automatically.

# ── The trip site ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com;

    # Allow larger uploads if you ever proxy them; gallery is client-side so
    # this is mostly a safe default.
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Traccar web UI ────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name traccar.your-domain.com;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Traccar's live map pushes updates over a websocket — these two
        # headers are required or the map silently stops refreshing.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }
}
